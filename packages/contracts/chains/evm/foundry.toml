# Two compile profiles because Safe and Drips' Streams need opposite pipelines:
#   - default (via_ir = true): Streams._squeezeStreams overflows the legacy stack once a concrete
#     contract exposes it, so the mined streaming core needs the IR pipeline. Skips src/aa.
#   - aa (via_ir = false): Safe's execTransaction can't be stack-scheduled under IR, so the AA stack
#     (EntryPoint + Safe + paymaster) builds on the legacy pipeline. Scoped to `src = src/aa` and skips
#     tests so the legacy pipeline never touches Streams (which only compiles under IR).
# `npm run build:sol` runs both to populate out/ for deploy.
[profile.default]
src = "solidity"
out = "out"
libs = ["lib"]
auto_detect_solc = true
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = true
skip = ["solidity/aa/**"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "openzeppelin-contracts/=lib/openzeppelin-v4/contracts/",
    "forge-std/=lib/forge-std/src/",
    "solady/=lib/solady/src/",
    "@account-abstraction/=lib/account-abstraction/",
    "@safe-global/safe-contracts/=lib/safe-contracts/",
    "@safe-global/safe-modules/=lib/safe-modules/modules/",
]

[profile.aa]
src = "solidity/aa"
via_ir = false
skip = ["test/**", "script/**"]
