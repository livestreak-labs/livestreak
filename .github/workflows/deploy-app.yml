name: Deploy app

# Push-to-deploy: build the frontend image in CI, push to ghcr.io, then SSH into
# the VPS and pull+run it. You only touch the PEM once (DEPLOY_KEY secret).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST        108.130.99.99
#   DEPLOY_USER        ubuntu
#   DEPLOY_KEY         <contents of uburu-key-pair.pem>
#   VITE_CHAIN_ID, VITE_ARC_RPC_URL, VITE_BUNDLER_URL, VITE_PAYMASTER_URL, VITE_USDC_ADDRESS
#
# One-time after the first run: make the ghcr package PUBLIC
#   (github.com/users/<you>/packages/container/livestreak-app/settings → Change visibility)
#   so the VPS can `docker pull` anonymously.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "packages/wallet/**"
      - "Dockerfile"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # ghcr requires a lowercase path; repository_owner is normally already lowercase.
  IMAGE_NAME: ${{ github.repository_owner }}/livestreak-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_CHAIN_ID=${{ secrets.VITE_CHAIN_ID }}
            VITE_ARC_RPC_URL=${{ secrets.VITE_ARC_RPC_URL }}
            VITE_BUNDLER_URL=${{ secrets.VITE_BUNDLER_URL }}
            VITE_PAYMASTER_URL=${{ secrets.VITE_PAYMASTER_URL }}
            VITE_USDC_ADDRESS=${{ secrets.VITE_USDC_ADDRESS }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            IMAGE=ghcr.io/${{ github.repository_owner }}/livestreak-app:latest
            docker pull "$IMAGE"
            docker network create uburu-network 2>/dev/null || true
            docker stop livestreak-app 2>/dev/null || true
            docker rm livestreak-app 2>/dev/null || true
            docker run -d \
              --name livestreak-app \
              --restart unless-stopped \
              --network uburu-network \
              -p 3000:3000 \
              "$IMAGE"
            docker image prune -f
            echo "--- waiting for health ---"
            sleep 5
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/ || echo 000)
            echo "GET / -> $code"
            docker logs --tail 20 livestreak-app || true
